# Server
server.port=${SERVER_PORT:4000}

# SQLite DataSource
spring.datasource.url=jdbc:sqlite:${DB_PATH:./yugoda.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Disable Spring Boot auto schema/data scripts (we handle init in code)
spring.sql.init.mode=never

# CORS (override via env)
app.cors.frontend-url=${FRONTEND_URL:}

# Firebase Admin SDK
# Set FIREBASE_SERVICE_ACCOUNT_PATH to enable cryptographic token verification.
# Download from: Firebase Console -> Project Settings -> Service Accounts -> Generate new private key
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}
firebase.project-id=${FIREBASE_PROJECT_ID:yugoda-5b36a}

# iyzico
iyzico.api-key=${IYZICO_API_KEY:dummy}
iyzico.secret-key=${IYZICO_SECRET_KEY:dummy}
iyzico.base-url=${IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}

# App URL (for payment callback)
app.url=${APP_URL:http://localhost:4000}

# Disable Whitelabel Error Page
server.error.whitelabel.enabled=false

# Logging
logging.level.yugoda=INFO
logging.level.org.hibernate.SQL=WARN
